#app/static/swagger.yaml

swagger: '2.0'
info:
  title: "Mechanic API"
  description: "This is a API to manage a Mechanic Shop"
  version: "1.0.0"
host: "be-1-mechanic-shop-api.onrender.com"
schemes:
  - "https"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header

# ENDPOINTS

#CUSTOMERS
paths:
  /customers/login:
    post:
      tags:
        - Customers
      summary: "Log in a customer"
      description: "Validates customer credentials, generates and returns a customer-specific authentication token."
      parameters:
        - in: "body"
          name: "body"
          description: "Customer login Credentials"
          required: true
          schema: 
            $ref: "#/definitions/LoginCredentials"
      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/LoginResponse"
          examples: 
            application/json:
              token: "kjsbvpiuahsenASDKLJASDKBASKDHI..."
              message: "Successfully logged in."
              status: "success"
        400:
          description: "Invalid login credentials."
          examples:
            application/json:
              message: "Invalid email or password!"

  /customers/: #endpoint
    post: 
      tags:
        - Customers
      summary: "Create a new customer"
      description: "Creates a new customer in our Mechanic Shop system, emails must be unique."
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to create a new customer."
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerPayload" 
      responses:
        201:
          description: "Successful Customer Creation"
          schema:
            $ref: "#/definitions/CustomerResponse"
          examples:
            application/json:
              id: 1
              name: John Doe
              DOB: "1990-01-01"
              email: john@email.com
              password: password123     
        400:
          description: "Invalid customer information."
          examples: 
            application/json:
              email: 
                - "Missing data for required field." 

    get:
      tags:
        - Customers
      summary: "Returns all Customers"
      description: "Returns a list of all customers."
      responses:
        200:
          description: "Retrieved Customers Successfully"
          schema: 
            type: array
            items: 
              $ref: "#/definitions/CustomerResponse" 
          examples: 
            application/json:
              - id: 1
                name: "test_user"
                email: "test@email.com"
                DOB: "1990-01-01"

  /customers/{customer_id}:
    parameters:
      - in: path
        name: customer_id
        required: true
        type: integer
        description: "The ID of the customer"

    get:
      tags:
        - Customers
      summary: "Get a customer by ID"
      description: "Returns a single customer using the supplied customer ID."
      responses:
        200:
          description: "Customer retrieved successfully."
          schema:
            $ref: "#/definitions/CustomerResponse"
        404:
          description: "Customer not found."
          examples: 
            application/json:
              error: "Customer not found."

    put: 
      tags:
        - Customers
      summary: "Update a customer"
      description: "Updates one or more fields belonging to an existing customer."
      parameters:
        - in: body
          name: body
          description: "Customer fields to update."
          required: true
          schema:
            $ref: "#/definitions/UpdateCustomerPayload"
      responses:
        200:
          description: "Successfully Updated Customer."
          schema:
            $ref: "#/definitions/UpdateCustomerResponse"
          examples:
            application/json:
              id: 1
              name: Joe Smith
              DOB: "1990-01-01"
              email: jsmith@email.com
              password: password123   
        400:
          description: "Invalid update information."
          examples:
            application/json:
              DOB: 
                - "Not a valid date."
        404:
          description: "Customer not found."
          examples:
            application/json:
              error: "Customer not found."  

    delete:
      tags:
        - Customers
      summary: "Delete a customer."
      description: "Deletes the customer associated with the supplied customer ID."
      responses:
        200:
          description: "Successfully Deleted Customer."
          schema:
            $ref: "#/definitions/DeleteCustomerResponse"
          examples:
            application/json:
              message: "Customer deleted successfully."
        404:
          description: "Customer not found."
          examples:
            application/json:
              error: "Customer not found."

  # MECHANIC ENDPOINTS

  /mechanics/:
    post:
      tags:
        - Mechanics
      summary: "Create a new mechanic"
      description: "Creates a new mechanic. Mechanic email addresses must be unique."
      parameters:
        - in: body
          name: body
          description: "Information required to create a mechanic."
          required: true
          schema:
            $ref: "#/definitions/CreateMechanicPayload"
      responses:
        201:
          description: "Mechanic created successfully."
          schema:
            $ref: "#/definitions/MechanicResponse"
          examples:
            application/json:
              id: 1
              name: "Jane Smith"
              email: "jane@email.com"
        400:
          description: "Invalid mechanic information or duplicate email."
          examples:
            application/json:
              error: "Email already associated with a mechanic."

    get:
      tags:
        - Mechanics
      summary: "Get all mechanics"
      description: "Returns a list of all mechanics."
      responses:
        200:
          description: "Mechanics retrieved successfully."
          schema:
            type: array
            items:
              $ref: "#/definitions/MechanicResponse"
          examples:
            application/json:
              - id: 1
                name: "Joe Bosh"
                email: "joe@email.com"
              - id: 2
                name: "Jane Smith"
                email: "jane@email.com"

  /mechanics/frequent:
    get:
      tags:
        - Mechanics
      summary: "Get mechanics by service ticket count"
      description: "Returns all mechanics sorted by the number of service tickets assigned to each mechanic."
      responses:
        200:
          description: "Mechanics retrieved successfully."
          schema:
            type: array
            items:
              $ref: "#/definitions/FrequentMechanicResponse"
          examples:
            application/json:
              - id: 1
                name: "Joe Bosh"
                email: "joe@email.com"
                ticket_count: 5
              - id: 2
                name: "Jane Smith"
                email: "jane@email.com"
                ticket_count: 2

  /mechanics/search:
    get:
      tags:
        - Mechanics
      summary: "Search mechanics by name"
      description: "Returns mechanics whose names contain the supplied search string."
      parameters:
        - in: query
          name: name
          required: true
          type: string
          description: "Name or partial name of the mechanic."
      responses:
        200:
          description: "Search completed successfully."
          schema:
            type: array
            items:
              $ref: "#/definitions/MechanicResponse"
          examples:
            application/json:
              - id: 1
                name: "Joe Bosh"
                email: "joe@email.com"

  /mechanics/{mechanic_id}:
    parameters:
      - in: path
        name: mechanic_id
        required: true
        type: integer
        description: "The ID of the mechanic."

    put:
      tags:
        - Mechanics
      summary: "Update a mechanic"
      description: "Updates one or more fields belonging to an existing mechanic."
      parameters:
        - in: body
          name: body
          description: "Mechanic fields to update."
          required: true
          schema:
            $ref: "#/definitions/UpdateMechanicPayload"
      responses:
        200:
          description: "Mechanic updated successfully."
          schema:
            $ref: "#/definitions/MechanicResponse"
          examples:
            application/json:
              id: 1
              name: "Joe Bosh"
              email: "jbosh@email.com"
        400:
          description: "Invalid mechanic information."
        404:
          description: "Mechanic not found."
          examples:
            application/json:
              error: "Mechanic not found"

    delete:
      tags:
        - Mechanics
      summary: "Delete a mechanic"
      description: "Deletes the mechanic associated with the supplied mechanic ID."
      responses:
        200:
          description: "Mechanic deleted successfully."
          schema:
            $ref: "#/definitions/DeleteMechanicResponse"
          examples:
            application/json:
              message: "Mechanic deleted successfully"
        404:
          description: "Mechanic not found."
          examples:
            application/json:
              error: "Mechanic not found"

#ITEMS
  /items/:
    post: 
      tags:
        - Items
      summary: "Create a new item"
      description: "Creates a new item in the mechanic shop inventory."
      parameters:
        - in: body
          name: body
          description: "Information required to create an item."
          required: true
          schema:
            $ref: "#/definitions/CreateItemPayload"
      responses:
        201:
          description: "Item created successfully."
          schema: 
            $ref: "#/definitions/ItemResponse"
          examples:
            application/json:
              id: 1
              item_name: "Oil Filter"
              price: 12.99
        400:
          description: "Invalid item information."
          examples:
            application/json:
              price: 
                - "Missing data for required field."

    get: 
      tags:
        - Items
      summary: "Get all items"
      description: "Returns a list of all items."
      responses: 
        200:
          description: "Items retrieved successfully."
          schema:
            type: array
            items:  
              $ref: "#/definitions/ItemResponse"
          examples:
            application/json:
              - id: 1
                item_name: "Brake Pads"
                price: 49.99
              - id: 2
                item_name: "Oil Filter"
                price: 12.99

  /items/{item_id}:
    parameters:
      - in: path
        name: item_id
        required: true
        type: integer
        description: "The ID of the item."

    get: 
      tags:
        - Items
      summary: "Get an item by ID"
      description: "Returns one item using the supplied item ID."
      responses:
        200:
          description: "Item retrieved successfully."
          schema:
            $ref: "#/definitions/ItemResponse"
          examples: 
            application/json:
              id: 1
              item_name: "Brake Pads"
              price: 49.99
        404:
          description: "Item not found."
          examples:
            application/json:
              error: "Item not found."

    put:
      tags: 
        - Items
      summary: "Update an item"
      description: "Updates one or more fields belonging to an existing item."
      parameters:
        - in: body
          name: body
          description: "Item fields to update."
          required: true
          schema:
            $ref: "#/definitions/UpdateItemPayload"
      responses:
        200:
          description: "Item updated successfully."
          schema:
            $ref: "#/definitions/ItemResponse"
          examples: 
            application/json:
              id: 1
              item_name: "Brake Pads"
              price: 59.99
        400:
          description: "Invalid item information."
          examples:
            application/json:
              unknown_field:
                - "Unknown field."
        404:
          description: "Item not found."
          examples:
            application/json:
              error: "Item not found."

    delete:
      tags:
        - Items
      summary: "Delete an item"
      description: "Deletes the item associated with the supplied item ID."
      responses:
        200:
          description: "Item deleted successfully."
          schema:
            $ref: "#/definitions/DeleteItemResponse"
          examples: 
            application/json:
              message: "Item 1 deleted successfully."
        404: 
          description: "Item not found."
          examples:
            application/json:
              error: "Item not found."


#INVENTORY:
  /inventory/:
    post:
      tags:
        - Inventory
      summary: "Create a new inventory item"
      description: "Creates a new inventory item for the mecahnic shop."
      parameters:
        - in: body
          name: body
          description: "Information required to create an inventory item."
          required: true
          schema:
            $ref: "#/definitions/CreateInventoryPayload"
      responses: 
        201:
          description: "Inventory item created successfully."
          schema:
            $ref: "#/definitions/InventoryResponse"
          examples:
            application/json:
              id: 1
              name: "Alternator"
              price: 189.99
        400:
          description: "Invalid inventory information."
          examples:
            application/json:
              price:
                - "Missing data for required field."

    get: 
      tags:
        - Inventory
      summary: "Get all inventory items"
      description: "Returns a list of all inventory items."
      responses:
        200:
          description: "Inventory retrieved successfully."
          schema:
            type: array
            items: 
              $ref: "#/definitions/InventoryResponse"
          examples: 
            application/json:
              - id: 1
                name: "Alternator"
                price: 189.99
              - id: 2
                name: "Starter Motor"
                price: 149.99

  /inventory/{item_id}:
    parameters:
      - in: path
        name: item_id
        required: true
        type: integer
        description: "The ID of the inventory item."

    get: 
      tags: 
        - Inventory
      summary: "Get an inventory item by ID"
      description: "Returns one inventory item using the supplied inventory ID."
      responses:
        200:
          description: "Inventory item retrieved successfully."
          schema:
            $ref: "#/definitions/InventoryResponse"
          examples:
            application/json:
              id: 1
              name: "Alternator"
              price: 189.99
        404:
          description: "Inventory item not found."
          examples:
            application/json:
              error: "Inventory item not found"

    put: 
      tags: 
        - Inventory
      summary: "Update an inventory item"
      description: "Updates one or more fields belonging to an existing inventory item."
      parameters:
        - in: body
          name: body
          description: "Inventory fields to update."
          required: true
          schema:
            $ref: "#/definitions/UpdateInventoryPayload"
      responses:
        200:
          description: "Inventory item updated successfully."
          schema:
            $ref: "#/definitions/InventoryResponse"
          examples:
            application/json:
              id: 1
              name: "Alternator"
              price: 199.99
        400:
          description: "Invalid inventory information."
        404:
          description: "Inventory item not found."
          examples:
            application/json:
              error: "Inventory item not found"

    delete: 
      tags:
        - Inventory
      summary: "Delete an inventory item"
      description: "Deletes the inventory item associated with the supplied inventory ID."
      responses:
        200:
          description: "Inventory item deleted successfully."
          schema: 
            $ref: "#/definitions/DeleteInventoryResponse"
          examples:
            application/json:
              message: "Inventory item 1 deleted successfully"
        404:
          description: "Inventory item not found."
          examples:
            application/json:
              error: "Inventory item not found"


#ORDERS:
  /orders/:
    post:
      tags:
        - Orders
      summary: "Create a new order"
      description: "Creates an order for a customer, adds the requested items, and returns a receipt."
      parameters:
        - in: body
          name: body
          description: "Customer ID and itmes included in the order"
          required: true
          schema: 
            $ref: "#/definitions/CreateOrder"
      responses:
        201:
          description: "Order successfully created"
          schema:
            $ref: "#/definitions/Receipt"
        400:
          description: "Invalid request data"
          schema:
            $ref: "#/definitions/ValidationError"
        404:
          description: "Customer or item not found"
          schema:
            $ref: "#/definitions/MessageResponse"
        500:
          description: "Unable to create order"
          schema:
            $ref: "#/definitions/MessageResponse"

    get: 
      tags:
        - Orders
      summary: "Get all orders"
      description: "Returns a list of all customer orders."
      responses:
        200:
          description: "Orders successfully retrieved"
          schema:
            type: array
            items:
              $ref: "#/definitions/Order"

  /orders/{order_id}:
    get:
      tags:
        - Orders
      summary: "Get an order by ID"
      description: "Returns a single order using its order ID."
      parameters:
        - in: "path"
          name: "order_id"
          description: "ID of the order"
          required: true
          type: integer
      responses:
        200:
          description: "Order successfully retrieved"
          schema:
            $ref: "#/definitions/Order"
        404:
          description: "Order not found"
          schema:
            $ref: "#definitions/MessageResponse"

    delete:
      tags:
        - Orders
      summary: "Delete an order"
      description: "Deletes an order and its associated order items."
      parameters:
        - in: "path"
          name: "order_id"
          description: "ID of the order to delete"
          required: true
          type: integer
      responses:
        200:
          description: "Order successfully deleted"
          schema:
            $ref: "#/definitions/MessageResponse"
        404:
          description: "Order not found"
          schema:
            $ref: "#/definitions/MessageResponse"
        500:
          description: "Unable to delete order"
          schema:
            $ref: "#/definitions/MessaageResponse"

  /orders/{order_id}/receipt:
    get:
      tags:
        - Orders
      summary: "Get an order receipt"
      description: "Returns an itemized receipt and total for an existing order."
      parameters:
        - in: "path"
          name: "order_id"
          description: "ID of the order"
          required: true
          type: integer
      responses:
        200:
          description: "Receipt successfully retrieved"
          schema:
            $ref: "#/definitions/MessageResponse"


#SERVICE TICKETS:
  /service-tickets/:
    post:
      tags:
        - Service Tickets
      summary: "Create a service ticket"
      description: "Creates a new service ticket."
      parameters:
        - in: body
          name: body
          description: "Service ticket information"
          required: true
          schema: 
            $ref: "#/definitions/CreateServiceTicket"
      responses:
        201:
          description: "Service ticket successfully created"
          schema: 
            $ref: "#/definitions/ServiceTicket"
        400:
          description: "Invalid service ticket data"
          schema:
            $ref: "#/definitions/ValidationError"

    get:
      tags:
        - Service Tickets
      summary: "Get all service tickets"
      description: "Returns a paginated list of service tickets."
      parameters:
        - in: query
          name: page
          description: "Page number"
          required: false
          type: integer
          default: 1
        - in: query
          name: "per_page"
          description: "Number of service tickets per page"
          required: false
          type: integer
          default: 10
      responses:
        200:
          description: "Service tickets successfully retrieved"
          schema:
            $ref: "#/definitions/PaginatedServiceTickets"

  /service-tickets/{ticket_id}:
    get:
      tags: 
        - Service Tickets
      summary: "Get a service ticket by ID"
      description: "Returns a single service ticket."
      parameters:
        - in: path
          name: "ticket_id"
          description: "ID of the service ticket"
          required: true
          type: integer
      responses:
        200:
          description: "Service ticket successfully retrieved"
          schema:
            $ref: "#/definitions/ServiceTicket"
        404:
          description: "Service ticket not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

    put:
      tags:
        - Service Tickets
      summary: "Edit service ticket mechanic assignments"
      description: "Adds or removes mechanics assigned to a service ticket."
      parameters:
        - in: path
          name: "ticket_id"
          description: "ID of the service ticket"
          required: true
          type: integer
        - in: body
          name: body
          description: "Mechanic IDs to add or remove"
          required: true
          schema:
            $ref: "#/definitions/EditServiceTicket"
      responses:
        200:
          description: "Service ticket successfully updated"
          schema:
            $ref: "#/definitions/ServiceTicket"
        400:
          description: "Invalid request data"
          schema:
            $ref: "#/definitions/ValidationError"
        404:
          description: "Service ticket not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

    delete:
      tags:
        - Service Tickets
      summary: "Delete a service ticket"
      description: "Deletes a service ticket and its relationship records."
      parameters:
        - in: path
          name: "ticket_id"
          description: "ID of the service ticket"
          required: true
          type: integer
      responses:
        200:
          description: "Service ticket successfully deleted"
          schema: 
            $ref: "#/definitions/MessageResponse"
        404:
          description: "Service ticket not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/{ticket_id}/assign-mechanic/{mechanic_id}:
    put:
      tags:
        - Service Tickets
      summary: "Assign a mechanic to a service ticket"
      description: "Adds a mechanic to the service ticket if not already assigned."
      parameters:
        - in: path
          name: "ticket_id"
          description: "ID of the service ticket"
          required: true
        - in: path
          name: "mechanic_id"
          description: "ID of the mechanic"
          required: true
          type: integer
      responses: 
        200:
          description: "Mechanic successfully assigned"
          schema:
            $ref: "#/definitions/ServiceTicket"
        404:
          description: "Service ticket or mechanic not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/{ticket_id}/remove-mechanic/{mechanic_id}:
    put:
      tags:
        - Service Tickets
      summary: "Remove a mechanic from a service ticket"
      description: "Removes a mechanic from the service ticket if assigned."
      parameters:
        - in: path
          name: "ticket_id"
          description: "ID of the service ticket"
          required: true
          type: integer
        - in: path
          name: "mechanic_id"
          description: "ID of the mechanic"
          required: true
          type: integer
      responses:
        200:
          description: "Mechanic successfully removed"
          schema: 
            $ref: "#/definitions/ServiceTicket"
        404:
          description: "Service ticket or mechanic not found"
          schema:
            $ref: "#/definitions/ErrorResponse"

  /service-tickets/{ticket_id}/add-part/{inventory_id}:
    put:
      tags:
        - Service Tickets
      summary: "Add an inventory part to a service ticket"
      description: "Adds an inventory item to the service ticket if not already attached."
      parameters:
        - in: path
          name: "ticket_id"
          description: "ID of the service ticket"
          required: true
          type: integer
        - in: path
          name: "inventory_id"
          description: "ID of the inventory item"
          required: true
          type: integer
      responses:
        200:
          description: "Inventory item successfully added"
          schema:
            $ref: "#/definitions/ServiceTicket"
        404:
          description: "Service ticket or inventory item not found"
          schema:
            $ref: "#/definitions/ErrorResponse"


#USERS:
  /users/login:
    post:
      tags:
        - Users
      summary: "Log in a user"
      description: "Validates user credentials and returns an authentication token."
      parameters:
        - in: "body"
          name: "body"
          description: "User login credentials"
          required: true
          schema:
            $ref: "#/definitions/UserLogin"
      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/UserLoginResponse"
        400:
          description: "Invalid login payload"
          schema:
            $ref: "#/definitions/MessageResponse"
        401:
          description: "Invalid email or password"
          schema:
            $ref: "#/definitions/MessageResponse"

  /users/:
    post:
      tags:
        - Users
      summary: "Create a user"
      description: "Creates a new user. Limited to three requests per hour per client."
      parameters:
        - in: "body"
          name: "body"
          description: "New user information"
          required: true
          schema:
            $ref: "#/definitions/CreateUser"
      responses:
        201:
          description: "User successfully created"
          schema:
            $ref: "#/definitions/User"
        400:
          description: "Invalid user data"
          schema:
            $ref: "#/definitions/ValidationError"
        409:
          description: "Email or username already exists"
          schema:
            $ref: "#/definitions/MessageResponse"
        429:
          description: "User creation rate limit exceeded"
          schema:
            $ref: "#/definitions/RateLimitResponse"

    get:
      tags:
        - Users
      summary: "Get all users"
      description: "Returns all users. Passwords are not included in the response."
      responses:
        200:
          description: "Users successfully retrieved"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/User"

    delete:
      tags:
        - Users
      summary: "Delete the authenticated user"
      description: "Deletes the user identified by the authentication token."
      security:
        - BearerAuth: []
      responses:
        200:
          description: "User successfully deleted"
          schema:
            $ref: "#/definitions/MessageResponse"
        401:
          description: "Authentication token is missing or invalid"
          schema:
            $ref: "#/definitions/MessageResponse"
        403:
          description: "Authentication token is not authorized"
          schema:
            $ref: "#/definitions/MessageResponse"
        404:
          description: "User not found"
          schema:
            $ref: "#/definitions/MessageResponse"


#EXAMPLES for Responses and Requests
#CUSTOMER Definitions:
definitions: 

  LoginCredentials:
    type: "object"
    required:
      - email
      - password
    properties:
      email:
        type: string
        format: email
        example: "test@email.com"
      password: 
        type: string
        example: "test"

  CreateCustomerPayload:
    type: "object"
    required: 
      - name
      - email
