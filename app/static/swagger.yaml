#app/static/swagger.yaml

swagger: '2.0'
info:
  title: "Mechanic API"
  description: "This is a API to manage a Mechanic Shop"
  version: "1.0.0"
host: "127.0.0.1:5000"
schemes:
  - "http"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header

# ENDPOINTS
paths:
  /customers/login:
    post:
      tags:
        - customers
      summary: "Login endpoint, (generates token)"
      description: "Validates customer credentials, generates and returns a customer specific token."
      parameters:
        - in: "body"
          name: "body"
          description: "Login Credentials"
          required: true
          schema: 
            $ref: "#/definitions/LoginCredentials"
      responses:
        200:
          description: "Login successful"
          schema:
            $ref: "#/definitions/LoginResponse"
          examples: 
            application/json:
              token: "kjsbvpiuahsenASDKLJASDKBASKDHI..."
              message: "Successfully logged in."
              status: "success"

  /customers: #endpoint
    post: 
      tags:
        - Customers
      summary: "Endpoint to create/register a new user."
      description: "Endpoint to create a new customer in our Mechanic Shop system, emails must be unique."
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to create a new Customer."
          required: true
          schema:
            $ref: "#/definitions/CreateCustomerPayload" 
      responses:
        201:
          descriptions: "Successful Customer Creation"
          schema:
            $ref: "#/definitions/CreateCustomerResponse"
          examples:
            application/json:
              id: 1
              name: John Doe
              DOB: "1990-01-01"
              email: john@email.com
              password: password123      

    get:
      tags:
        - Customers
      summary: "Returns all Customers"
      description: "Endpoint to retrieve a list of all customers."
      responses:
        200:
          description: "Retrieved Customers Successfully"
          schema: 
            $ref: "#/definitions/AllCustomers" 

    put: 
      tags:
        - Customers
      summary: "Endpoint to update a user."
      description: "Endpoint to update a customer, this is a token authenticated route, and hte user must be logged in to update their account."
      security: 
        - bearerAuth: []
      parameters:
        - in: "body"
          name: "body"
          description: "Information required to update a Customer."
          required: true
          schema: 
            $ref: "#/definitions/UpdateCustomerPayload"
      responses:
        200:
          description: "Successfully Updated Customer."
          schema:
            $ref: "#/definitions/UpdateCustomerResponse"
          examples:
            application/json:
              id: 1
              name: Joe Smith
              DOB: "1990-01-01"
              email: jsmith@email.com
              password: password123     

    delete:
      tags:
        - Customers
      summary: "Endpoint to delete a customer."
      description: "Endpoint to delete a customer. Requires token authentication, customer must be logged in to delete their account."
      security:
        - bearerAuth: []
      responses:
        200:
          description: "Successfully Deleted Customer."
          schema:
            $ref: "#/definitions/DeleteCustomerResponse"
          examples:
            application/json:
              message: "Successfully deleted user <customer_id>."


#EXAMPLES for Responses and Requests
definitions: 

  LoginCredentials:
    type: "object"
    properties:
      email:
        type: "string"
      password:
        type: "string"
      
    required:
      - email
      - password

  CreateCustomerPayload:
    type: "object"
    properties:
      name: 
        type: "string"
      email:
        type: "string"
      DOB: 
        type: "string"
        format: date
      password:
        type: "string"

    required: 
      - name
      - email
      - DOB
      - password

  CreateCustomerResponse:
    type: "object"
    properties: 
      id: 
        type: "int"
      name: 
        type: "string"
      email:
        type: "string"
      DOB:
        type: "string"
      password:
        type: "string"
    
  LoginResponse:
    type: "object"
    properties:
      token:
        type: "string"
      message:
        type: "string"
      status:
        type: "string"

  AllCustomers:
    tyep: "array"
    items:
      type: "object"
      properties:
        id:
          type: "integer"
        name:
          type: "string"
        email: 
          type: "string"
        DOB: 
          type: "string"
        password:
          type: "string"
  
  UpdateCustomerPayload:
    type: "object"
    properties:
      name:
        type: "string"
      email: 
        type: "string"
      DOB: 
        type: "string"
        format: "date"
      password:
        type: "string"

    required:
      - name
      - email
      - DOB
      - password

  UpdateCustomerResponse:
    type: "object"
    properties: 
      id: 
        type: "integer"
      name: 
        type: "string"
      email: 
        type: "string"
      DOB: 
        type: "string"
      password: 
        type: "string"

  DeleteCustomerResponse:
    type: "object"
    properties: 
      message:
        type: "string"